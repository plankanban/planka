version: '3.8'

services:
  # 1. SERVICO DE TUNELAMENTO SSH DEDICADO (mantido para o ambiente Ipelabor)
  ssh_tunnel:
    build:
      context: .
      dockerfile: dockerfile.ssh
    container_name: ssh_tunnel_planka
    restart: unless-stopped
    # logging:
    #   driver: "none"

  planka:
    container_name: planka
    build:
      context: .
      dockerfile: Dockerfile
    image: ipelabor/planka:2.1.1-recurring
    restart: on-failure

    volumes:
      - data:/app/data
      # Reuse the legacy volumes at the new PLANKA 2.1+ data paths.
      - favicons:/app/data/protected/favicons
      - user-avatars:/app/data/protected/user-avatars
      - background-images:/app/data/protected/background-images
      - attachments:/app/data/private/attachments
      # - ./terms:/app/terms/custom

    ports:
      - 7002:1337

    environment:
      - BASE_URL=http://ipelabor.sytes.net:7002

      # DATABASE_URL apontando para o servidor externo
      - DATABASE_URL=postgresql://root:q1w2e3@ipelabor.sytes.net:7432/planka

      - SECRET_KEY=8A5kLzTq9oPj1fGyC4hR2sXbN7vM3uW6eD0iFaE5gB9cJxK7lY8mZ4pV6rS3tQ2wU1

      # Configuracao de administrador padrao do Planka
      - DEFAULT_ADMIN_EMAIL=gustavo.souza@ipelabor.com.br
      - DEFAULT_ADMIN_PASSWORD=MagicKir137!
      - DEFAULT_ADMIN_NAME=Gustavo Souza
      - DEFAULT_ADMIN_USERNAME=twentyone
      # Outras configuracoes opcionais
      # - LOG_LEVEL=warn

      # Email Notifications (https://nodemailer.com/smtp/)
      # These values override and disable configuration in the UI if set.
      - SMTP_HOST=mail.ipelabor.com.br
      - SMTP_PORT=465
      - SMTP_NAME=Gustavo Souza
      - SMTP_SECURE=true
      - SMTP_TLS_REJECT_UNAUTHORIZED=false
      - SMTP_USER=gustavo.souza@ipelabor.com.br
      - SMTP_PASSWORD=MagicKir137!
      # Optionally store in secrets - then SMTP_PASSWORD should not be set
      # - SMTP_PASSWORD__FILE=/run/secrets/smtp_password
      - SMTP_FROM="Gustavo Souza" <gustavo.souza@ipelabor.com.br>

    depends_on:
      ssh_tunnel:
        condition: service_started

volumes:
  data:
  favicons:
  user-avatars:
  background-images:
  attachments:
